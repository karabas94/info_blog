      <div class="site-footer__brand">
        <strong>MyBlog</strong>
        <p>{% trans "A simple, fast blog." %}</p>

        <p>{% trans "Contact:" %} <a href="mailto:hello@myblog.example">hello@myblog.example</a></p>

      <div class="site-footer__copy">
        <p>&copy; {% now "Y" %} MyBlog. {% trans "All rights reserved." %}</p>
